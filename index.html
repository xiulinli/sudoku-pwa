<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="数独">
    <title>数独游戏</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>数独游戏</h1>
            <div class="game-info">
                <div class="difficulty-selector">
                    <label>难度：</label>
                    <select id="difficulty">
                        <option value="easy">简单</option>
                        <option value="medium">进阶</option>
                        <option value="expert">专家</option>
                    </select>
                </div>
                <div class="level-selector">
                    <label>关卡：</label>
                    <select id="level"></select>
                </div>
                <div class="timer">
                    <span id="timer">00:00</span>
                </div>
            </div>
        </div>

        <div class="game-area">
            <div class="sudoku-board" id="sudokuBoard"></div>
            
            <div class="controls">
                <div class="number-pad">
                    <button class="num-btn" data-num="1">1</button>
                    <button class="num-btn" data-num="2">2</button>
                    <button class="num-btn" data-num="3">3</button>
                    <button class="num-btn" data-num="4">4</button>
                    <button class="num-btn" data-num="5">5</button>
                    <button class="num-btn" data-num="6">6</button>
                    <button class="num-btn" data-num="7">7</button>
                    <button class="num-btn" data-num="8">8</button>
                    <button class="num-btn" data-num="9">9</button>
                    <button class="num-btn clear-btn" data-num="0">清除</button>
                </div>
                
                <div class="action-buttons">
                    <button id="newGameBtn">新游戏</button>
                    <button id="hintBtn">提示</button>
                    <button id="noteModeBtn">标记模式</button>
                    <button id="resetBtn">重置</button>
                </div>
            </div>
        </div>

        <div class="message" id="message"></div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>恭喜！你成功完成了数独！</h2>
            <div class="modal-buttons">
                <button id="nextLevelBtn">下一关</button>
                <button id="backBtn">返回</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker注册成功:', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker注册失败:', error);
                    });
            });
        }
    </script>
</body>
</html>
